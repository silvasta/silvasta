[project]
name = "silvasta"
version = "0.1.0"
description = "Collection of frequently used generalized utils, functions and tools"
readme = "README.md"
authors = [{ name = "silvan", email = "silvasta3@gmail.com" }]
requires-python = ">=3.11"
dependencies = ["pick>=2.6.0", "pydantic>=2.12.5", "pydantic-settings>=2.13.1"]

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[project.optional-dependencies]
log = ["loguru", "rich"]
cli = ["typer", "silvasta[log]"]
tui = ["textual", "silvasta[cli]"]
viz = ["matplotlib", "seaborn"]
# the bundle
all = ["silvasta[tui,viz]"]

[project.scripts]
silvasta-tail = "silvasta.cli.monitor:main"

[tool.silvasta.logging]
level = "INFO"
file_name = "utils.log"
log_dir = "logs"
retention = "1 month"
rotation = "10 MB"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 79

[tool.ruff.lint]
select = [
  "E",  # E: pycodestyle errors
  "F",  # F: Pyflakes
  "I",  # I: isort (import sorting)
  "UP", # UP: pyupgrade (modernize syntax)
  "B",  # B: flake8-bugbear (finds likely bugs) 
  "N",  # N: pep8-naming
]
ignore = [
  "E501", # Ignore long lines: only format, not error on them
]
