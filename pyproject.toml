[project]
name = "silvasta"
version = "0.1.0"
description = "Collection of frequently used generalized utils, functions and tools"
readme = "README.md"
authors = [{ name = "silvan", email = "silvasta3@gmail.com" }]
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.12.5",
    "pydantic-settings>=2.13.1",
]

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[project.optional-dependencies]
log = ["loguru", "rich"]
cli = ["typer", "silvasta[log]"]
tui = ["textual", "silvasta[cli]"]
viz = ["matplotlib", "seaborn"]
# the bundle
all = ["silvasta[tui,viz]"]

[project.scripts]
silvasta-tail = "silvasta.cli.monitor:main"

[tool.silvasta.logging]
level = "INFO"
file_name = "utils.log"
rotation = "10 MB"
retention = "1 month"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
